monitoredService:
  orgIdentifier: default
  projectIdentifier: CV_Sanity
  identifier: demosvc_demoenv
  name: demosvc_demoenv
  type: Application
  description: ""
  serviceRef: demosvc
  environmentRef: demoenv
  environmentRefList:
  - demoenv
  sources:
    healthSources:
    - name: prometheus-health-source
      identifier: prometheushealthsource
      type: Prometheus
      spec:
        connectorRef: promeprojcheck
        metricPacks:
        - identifier: Custom
        metricDefinitions:
        - identifier: prometheus_metric
          metricName: Prometheus Metric
          riskProfile:
            category: Performance
            metricType: RESP_TIME
            riskCategory: Performance_ResponseTime
            thresholdTypes:
            - ACT_WHEN_LOWER
          analysis:
            liveMonitoring:
              enabled: false
            deploymentVerification:
              enabled: true
              serviceInstanceFieldName: instance
            riskProfile:
              category: Performance
              metricType: RESP_TIME
              riskCategory: Performance_ResponseTime
              thresholdTypes:
              - ACT_WHEN_LOWER
          sli:
            enabled: false
          query: "(sum(rate(http_server_request_duration_seconds_count{k8s_namespace_name=\"\
            online-boutique\",http_response_status_code!~\"5..\"}[5m])) / sum(rate(http_server_request_duration_seconds_count{k8s_namespace_name=\"\
            online-boutique\"}[5m]))) * 100"
          groupName: g1
          serviceInstanceFieldName: instance
          isManualQuery: true
  enabled: false
