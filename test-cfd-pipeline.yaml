pipeline:
  name: test-cfd-pipeline
  identifier: testcfdpipeline
  projectIdentifier: TestingShubhendu
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: propagation
        identifier: propagation
        tags: {}
        template:
          templateRef: cfdteststagetemp
          versionLabel: "1"
          templateInputs:
            type: Deployment
            spec:
              service:
                serviceRef: <+input>
                serviceInputs: <+input>
    - stage:
        name: infra
        identifier: infra
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: echo "Hello"
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
        tags: {}
    - stage:
        name: deploy
        identifier: deploy
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          environment:
            useFromStage:
              stage: propagation
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: ShellScript_1
                  identifier: ShellScript_1
                  spec:
                    shell: Bash
                    executionTarget: {}
                    source:
                      type: Inline
                      spec:
                        script: echo "world"
                    environmentVariables: []
                    outputVariables: []
                  timeout: 10m
              - stepGroup:
                  name: stepgrp1
                  identifier: stepgrp1
                  steps:
                    - step:
                        type: K8sCanaryDeploy
                        name: K8sCanaryDeploy_1
                        identifier: K8sCanaryDeploy_1
                        spec:
                          skipDryRun: false
                          instanceSelection:
                            type: Count
                            spec:
                              count: 1
                        timeout: 10m
                    - parallel:
                        - step:
                            type: ShellScript
                            name: ShellScript_3
                            identifier: ShellScript_3
                            spec:
                              shell: Bash
                              executionTarget: {}
                              source:
                                type: Inline
                                spec:
                                  script: echo "Hello"
                              environmentVariables: []
                              outputVariables: []
                            timeout: 10m
                        - step:
                            type: ShellScript
                            name: ShellScript_3_1
                            identifier: ShellScript_3_1
                            spec:
                              shell: Bash
                              executionTarget: {}
                              source:
                                type: Inline
                                spec:
                                  script: echo "Hello"
                              environmentVariables: []
                              outputVariables: []
                            timeout: 10m
                        - stepGroup:
                            name: stepgrp2
                            identifier: stepgrp2
                            steps:
                              - parallel:
                                  - step:
                                      type: ShellScript
                                      name: ShellScript_4
                                      identifier: ShellScript_4
                                      spec:
                                        shell: Bash
                                        executionTarget: {}
                                        source:
                                          type: Inline
                                          spec:
                                            script: echo "Hello"
                                        environmentVariables: []
                                        outputVariables: []
                                      timeout: 10m
                                  - step:
                                      type: Verify
                                      name: Verify_1
                                      identifier: Verify_1
                                      spec:
                                        isMultiServicesOrEnvs: false
                                        type: Rolling
                                        monitoredService:
                                          type: Default
                                          spec: {}
                                        spec:
                                          sensitivity: HIGH
                                          duration: 15m
                                      timeout: 2h
                                      failureStrategies:
                                        - onFailure:
                                            errors:
                                              - Verification
                                            action:
                                              type: ManualIntervention
                                              spec:
                                                timeout: 2h
                                                onTimeout:
                                                  action:
                                                    type: StageRollback
                                        - onFailure:
                                            errors:
                                              - Unknown
                                            action:
                                              type: ManualIntervention
                                              spec:
                                                timeout: 2h
                                                onTimeout:
                                                  action:
                                                    type: Ignore
                    - step:
                        type: K8sCanaryDelete
                        name: K8sCanaryDelete_1
                        identifier: K8sCanaryDelete_1
                        spec: {}
            rollbackSteps: []
          service:
            useFromStage:
              stage: propagation
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
