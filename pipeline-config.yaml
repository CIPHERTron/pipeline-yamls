pipeline:
  name: goldman-cfd-test
  identifier: goldmancfdtest
  projectIdentifier: CV_Sanity
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: test-release
        identifier: testrelease
        description: ""
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: svcmultihs1
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: <+input>
                      sources: <+input>
            gitBranch: feature
          environment:
            environmentRef: TestEnv1
            deployToAll: false
            infrastructureDefinitions:
              - identifier: TestInfra
          execution:
            steps:
              - step:
                  type: Verify
                  name: Verify
                  identifier: Verify
                  timeout: 2h
                  spec:
                    isMultiServicesOrEnvs: false
                    type: Canary
                    monitoredService:
                      type: Default
                      spec: {}
                    spec:
                      sensitivity: HIGH
                      duration: 15m
                  failureStrategies:
                    - onFailure:
                        errors:
                          - Verification
                        action:
                          type: ManualIntervention
                          spec:
                            timeout: 2h
                            onTimeout:
                              action:
                                type: StageRollback
                    - onFailure:
                        errors:
                          - Unknown
                        action:
                          type: ManualIntervention
                          spec:
                            timeout: 2h
                            onTimeout:
                              action:
                                type: Ignore
            rollbackSteps: []
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
        variables:
          - name: resourceNamePrefix
            type: String
            description: ""
            required: false
            value: test
          - name: APPDYNAMICS_AGENT_ACCOUNT_ACCESS_KEY
            type: Secret
            description: ""
            required: false
            value: APPDYNAMICS_AGENT_ACCOUNT_ACCESS_KEY
